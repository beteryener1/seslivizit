<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoğun Bakım Vizit Asistanı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .app-container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .patient-info { background: #e7f3ff; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #007bff; }
        textarea { width: 100%; height: 250px; border: 1px solid #ccc; border-radius: 10px; padding: 15px; font-size: 16px; box-sizing: border-box; resize: none; background: #fafafa; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #recordBtn { background: #28a745; color: white; grid-column: span 2; }
        #recordBtn.recording { background: #dc3545; animation: blink 1.5s infinite; }
        #nextBtn { background: #007bff; color: white; }
        #finishBtn { background: #6c757d; color: white; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2>🩺 Yoğun Bakım Vizit Notları</h2>
    </div>

    <div class="patient-info" id="counter">Mevcut Hasta: 1 / 25</div>
    
    <textarea id="output" placeholder="Doktor bey/hanım, konuşmaya başlayabilirsiniz..."></textarea>

    <div class="controls">
        <button id="recordBtn">🎤 Kaydı Başlat</button>
        <button id="nextBtn">➡️ Sıradaki Hasta</button>
        <button id="finishBtn">💾 Viziti Bitir (Word)</button>
    </div>
</div>

<script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
    let patientCount = 1;
    let allReports = [];
    let isRecording = false;
    let finalTranscript = ""; // Duraksamalarda silinmemesi için ana depo

    const recordBtn = document.getElementById('recordBtn');
    const output = document.getElementById('output');
    const counterDisplay = document.getElementById('counter');

    // Ses Tanıma Kurulumu
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.lang = 'tr-TR';
    recognition.continuous = true; // Kesintisiz dinleme
    recognition.interimResults = true; // Konuşurken ekrana yazma

    recognition.onresult = (event) => {
        let interimTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript += transcript + " ";
            } else {
                interimTranscript += transcript;
            }
        }
        // Ekrana hem kesinleşmiş hem de o anki tahmini yazdırıyoruz
        output.value = finalTranscript + interimTranscript;
    };

    recognition.onend = () => {
        // Eğer kullanıcı durdurmadıysa ama tarayıcı kestiysye geri başlat
        if (isRecording) {
            recognition.start();
        }
    };

    recordBtn.onclick = () => {
        if (!isRecording) {
            recognition.start();
            isRecording = true;
            recordBtn.innerText = "🛑 Kaydı Duraklat";
            recordBtn.classList.add('recording');
        } else {
            recognition.stop();
            isRecording = false;
            recordBtn.innerText = "🎤 Kayda Devam Et";
            recordBtn.classList.remove('recording');
        }
    };

    document.getElementById('nextBtn').onclick = () => {
        // Mevcut veriyi kaydet
        allReports.push({
            id: patientCount,
            content: output.value
        });

        // Ekranı ve değişkeni sıfırla
        patientCount++;
        counterDisplay.innerText = `Mevcut Hasta: ${patientCount} / 25`;
        finalTranscript = ""; 
        output.value = "";
    };

    document.getElementById('finishBtn').onclick = () => {
        // Son hastayı ekle (eğeri kutu boş değilse)
        if(output.value !== "") {
            allReports.push({ id: patientCount, content: output.value });
        }
        saveToWord();
    };

    function saveToWord() {
        const { Document, Paragraph, TextRun, HeadingLevel, Packer } = docx;
        const children = [
            new Paragraph({ text: "GÜNLÜK VİZİT RAPORU", heading: HeadingLevel.HEADING_1, alignment: "center" })
        ];

        allReports.forEach(r => {
            children.push(new Paragraph({ text: `Hasta #${r.id}`, heading: HeadingLevel.HEADING_2, spacing: { before: 400 } }));
            children.push(new Paragraph({ children: [new TextRun(r.content)] }));
        });

        const doc = new Document({ sections: [{ children }] });
        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `Vizit_${new Date().toLocaleDateString()}.docx`);
        });
    }
</script>

</body>
</html>
