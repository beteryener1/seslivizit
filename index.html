<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yoğun Bakım Vizit Sistemi</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .patient-badge { background: #007aff; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        textarea { width: 100%; height: 280px; border: 1px solid #ddd; border-radius: 12px; padding: 15px; font-size: 17px; line-height: 1.5; box-sizing: border-box; background: #fafafa; margin-bottom: 15px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: active 0.1s; }
        button:active { opacity: 0.7; transform: scale(0.98); }
        #recordBtn { background: #34c759; color: white; grid-column: span 2; }
        #recordBtn.recording { background: #ff3b30; animation: pulse 1.5s infinite; }
        #nextBtn { background: #007aff; color: white; }
        #finishBtn { background: #8e8e93; color: white; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="status-header">
        <span style="font-size: 18px; font-weight: bold;">🩺 Vizit Kayıt</span>
        <span id="counter" class="patient-badge">Hasta: 1 / 25</span>
    </div>

    <textarea id="output" placeholder="Kaydı başlatın ve konuşun..."></textarea>

    <div class="btn-group">
        <button id="recordBtn">🎤 Kaydı Başlat</button>
        <button id="nextBtn">➡️ Sıradaki Hasta</button>
        <button id="finishBtn">📄 Viziti Kapat (Word)</button>
    </div>
</div>

<script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<script>
    // --- TIBBİ SÖZLÜK AYARLARI ---
    const medicalDictionary = {
        "sat ": "Saturasyon: ",
        "ta ": "Tansiyon: ",
        "nbz ": "Nabız: ",
        "eks oldu": "Ex oldu",
        "entübe": "Entübe",
        "ekstübe": "Ekstübe",
        "batın rahat": "Batın rahat, defans-rebound yok.",
        "asit": "Asit (Ascites)"
    };

    function applyMedicalJargon(text) {
        let corrected = text.toLowerCase();
        for (const [key, value] of Object.entries(medicalDictionary)) {
            corrected = corrected.replace(new RegExp(key, 'g'), value);
        }
        return corrected;
    }

    // --- SES TANIMA AYARLARI ---
    let patientCount = 1;
    let reports = [];
    let isRecording = false;
    let finalTranscript = "";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'tr-TR';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            let chunk = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript += applyMedicalJargon(chunk) + " ";
            } else {
                interim += chunk;
            }
        }
        document.getElementById('output').value = finalTranscript + interim;
    };

    recognition.onend = () => { if (isRecording) recognition.start(); };

    document.getElementById('recordBtn').onclick = () => {
        if (!isRecording) {
            recognition.start();
            isRecording = true;
            document.getElementById('recordBtn').innerText = "🛑 Kaydı Duraklat";
            document.getElementById('recordBtn').classList.add('recording');
        } else {
            recognition.stop();
            isRecording = false;
            document.getElementById('recordBtn').innerText = "🎤 Kayda Devam Et";
            document.getElementById('recordBtn').classList.remove('recording');
        }
    };

    document.getElementById('nextBtn').onclick = () => {
        reports.push({ id: patientCount, text: document.getElementById('output').value });
        patientCount++;
        document.getElementById('counter').innerText = `Hasta: ${patientCount} / 25`;
        document.getElementById('output').value = "";
        finalTranscript = "";
    };

    document.getElementById('finishBtn').onclick = () => {
        if(document.getElementById('output').value) {
            reports.push({ id: patientCount, text: document.getElementById('output').value });
        }
        
        const { Document, Paragraph, TextRun, HeadingLevel, Packer } = docx;
        const sections = reports.map(r => [
            new Paragraph({ text: `Hasta #${r.id}`, heading: HeadingLevel.HEADING_2, spacing: {before: 400} }),
            new Paragraph({ children: [new TextRun(r.text)] })
        ]).flat();

        const doc = new Document({ sections: [{ children: [
            new Paragraph({ text: "GÜNLÜK VİZİT RAPORU", heading: HeadingLevel.HEADING_1, alignment: "center" }),
            ...sections
        ]}] });

        Packer.toBlob(doc).then(blob => { saveAs(blob, "Vizit_Raporu.docx"); });
    };
</script>
</body>
</html>
